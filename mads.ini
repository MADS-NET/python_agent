[perf_assess]
pub_topic = "perf_assess"

[feedback]
# Subscribes to ALL topics
sub_topic = [""]
print_width = 0
indent_width = 2

[source]
python_module = "source"

[filter]
python_module = "filter"
port = "undefined"
sub_topic = ["source"]

[sink]
python_module = "sink"
sub_topic = [""]